{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <form method="post" class="auth-card">
            {% csrf_token %}

            {% if form.errors %}
                <div class="message">
                    Invalid username or password.
                </div>
            {% endif %}

            <div class="form-group">
                <label for="id_username">Username:</label>
                <input type="text" name="username" id="id_username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="id_password">Password:</label>
                <input type="password" name="password" id="id_password" placeholder="Enter your password" required>
            </div>

            <div class="row-buttons">
                <button type="submit" class="btn">Login</button>
                <a href="{% url 'users:signup' %}" class="btn">Sign up</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
