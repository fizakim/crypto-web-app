{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Sign in to your Crypto Playground account</p>

        <form method="post" style="width:100%; display:flex; flex-direction:column; align-items:center; gap:18px;">
            {% csrf_token %}

            {% if form.errors %}
                <div class="message">
                    Invalid username or password.
                </div>
            {% endif %}

            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" placeholder="Enter your password" required>
            </div>

            <div class="row-buttons">
                <button type="submit" class="btn btn-primary">Login</button>
                <a href="{% url 'users:signup' %}" class="btn btn-secondary">Sign up</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
