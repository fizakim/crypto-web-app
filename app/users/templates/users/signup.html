{% extends 'base.html' %}
{% load static %}

{% block title %}Sign Up - Crypto Playground{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/userStyle.css' %}">{% endblock %}

{% block content %}
<div class="card auth-container">
    <img src="{% static 'media/wallet.png' %}" alt="wallet">
    <h2>Create a Wallet</h2>
    <form method="post" class="auth-form">
        {% csrf_token %}
        <p>
            <input type="text" name="username" placeholder='Username (Max 100)' maxlength="100" required id="id_username">
        </p>
        <p><input type="password" name="password" placeholder="Password" id="id_password"></p>
        <button type="submit">Sign Up</button>
    </form>
    <p class="auth-link">
        Already have an account? <a href="{% url 'users:login' %}">Log In</a>
    </p>
</div>
{% endblock %}
